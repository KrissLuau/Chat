<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BLACKWIRE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

  :root{
    --bg: #060a06;
    --bg-panel: #0b120b;
    --green: #33ff6a;
    --green-dim: #1c8a3e;
    --amber: #ffb000;
    --red: #ff4444;
    --text: #c9e6c9;
    --text-dim: #5f7a5f;
    --border: #1a3a1a;
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    height: 100vh;
    overflow: hidden;
  }
  body::before{
    content:"";
    position: fixed; inset:0;
    pointer-events:none;
    background: repeating-linear-gradient(to bottom, rgba(0,0,0,0) 0px, rgba(0,0,0,0) 2px, rgba(0,0,0,0.15) 3px);
    z-index: 999;
    mix-blend-mode: overlay;
  }
  ::selection{ background: var(--green); color:#000; }
  input, button, textarea{ font-family: inherit; }

  #app{ height:100%; display:flex; flex-direction:column; }

  #boot{
    position: fixed; inset:0;
    background: var(--bg);
    z-index: 1000;
    padding: 6vh 6vw;
    font-size: 13px;
    color: var(--green);
    white-space: pre-wrap;
    font-family: 'IBM Plex Mono', monospace;
  }
  #boot .cursor{ animation: blink 1s step-end infinite; }
  @keyframes blink{ 50%{ opacity:0; } }

  #landing{
    height:100%; display:none; align-items:center; justify-content:center;
    padding: 24px; overflow-y:auto;
  }
  .card{
    width: 100%; max-width: 420px;
    border: 1px solid var(--border);
    background: var(--bg-panel);
    padding: 28px 26px;
    margin: auto;
  }
  .card h1{
    font-family:'JetBrains Mono',monospace; color: var(--green);
    font-size: 22px; margin-bottom: 6px; text-shadow: 0 0 14px rgba(51,255,106,.35);
  }
  .card .sub{ color: var(--text-dim); font-size: 12px; margin-bottom: 22px; }
  label{ display:block; font-size: 11px; letter-spacing:1px; text-transform:uppercase; color: var(--green-dim); margin: 16px 0 6px; }
  label:first-of-type{ margin-top:0; }
  input[type=text], input[type=password]{
    width:100%; background:#000; border:1px solid var(--border); color:var(--text);
    padding: 10px 12px; font-size:14px; outline:none;
  }
  input[type=text]:focus, input[type=password]:focus{ border-color: var(--green-dim); }
  .row{ display:flex; gap:10px; }
  .row input{ flex:1; }
  .genbtn{
    background: var(--bg-panel); border:1px solid var(--green-dim); color: var(--green);
    padding: 0 12px; cursor:pointer; font-size:12px;
  }
  .genbtn:hover{ background: var(--green); color:#000; }
  .primary{
    margin-top: 22px; width:100%; padding: 12px; background: var(--green); color:#000;
    border:none; font-weight:700; letter-spacing:.5px; cursor:pointer; font-size:14px;
  }
  .primary:hover{ background: #4dff85; }
  .primary:disabled{ background: var(--border); color: var(--text-dim); cursor:not-allowed; }

  .lock-hint{ font-size: 10.5px; color: var(--text-dim); margin-top: 6px; }

  #chat{ display:none; height:100%; flex-direction:column; }
  #chat.show{ display:flex; }

  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding: 10px 16px; border-bottom: 1px solid var(--border);
    background: var(--bg-panel); font-size: 12px; gap: 8px; flex-wrap: wrap;
  }
  .topbar .room{ color: var(--green); }
  .topbar .room b{ color: var(--amber); }
  .topbar .status{ font-size: 10px; color: var(--text-dim); }
  .topbar .status.live{ color: var(--green); }
  .topbar .status.live::before{ content:"🔒 "; }
  .topbar .status.down::before{ content:"● "; color: var(--red); }
  .topbar button{
    background:none; border:1px solid var(--border); color: var(--text-dim);
    padding: 5px 10px; font-size: 11px; cursor:pointer;
  }
  .topbar button:hover{ border-color: var(--red); color: var(--red); }

  #messages{
    flex:1; overflow-y:auto; padding: 16px; font-size: 13.5px;
  }
  .msg{ margin-bottom: 12px; display:flex; gap:8px; }
  .msg .ts{ color: var(--text-dim); font-size: 10px; white-space:nowrap; padding-top:2px; }
  .msg .body{ flex:1; }
  .msg .who{ color: var(--green); font-weight:600; }
  .msg.me .who{ color: var(--amber); }
  .msg .txt{ color: var(--text); word-break: break-word; }
  .sys{ color: var(--text-dim); font-size:11.5px; margin-bottom:12px; font-style:italic; }

  #inputbar{
    display:flex; border-top: 1px solid var(--border); background: var(--bg-panel);
    padding: 10px 12px; gap: 10px;
  }
  #msginput{
    flex:1; background:#000; border:1px solid var(--border); color: var(--text);
    padding: 10px 12px; font-size:14px; outline:none;
  }
  #msginput:focus{ border-color: var(--green-dim); }
  #sendbtn{
    background: var(--green); color:#000; border:none; padding: 0 18px;
    font-weight:700; cursor:pointer; font-size:13px;
  }
  #sendbtn:hover{ background:#4dff85; }
  #sendbtn:disabled{ background: var(--border); color: var(--text-dim); cursor:not-allowed; }

  #photobtn{
    background:none; border:1px solid var(--border); color: var(--text-dim);
    padding: 0 14px; font-size:16px; cursor:pointer;
  }
  #photobtn:hover{ border-color: var(--green-dim); color: var(--green); }
  #photobtn:disabled{ opacity:0.4; cursor:not-allowed; }

  .msg .img-wrap{ margin-top:4px; }
  .msg .img-wrap img{
    max-width: 220px; max-height: 260px; border-radius: 2px;
    border: 1px solid var(--border); display:block;
  }
  .msg .img-loading{ color: var(--text-dim); font-size: 11px; font-style: italic; }
</style>
</head>
<body>
<div id="boot"></div>
<div id="app">

  <div id="landing">
    <div class="card">
      <h1>&gt;_ BLACKWIRE</h1>

      <label>handle</label>
      <input type="text" id="nameInput" placeholder="z.B. nb0x" maxlength="20">

      <label>channel</label>
      <div class="row">
        <input type="text" id="roomInput" placeholder="z.B. keks-42-gruen" maxlength="40">
        <button class="genbtn" id="genBtn" type="button">generieren</button>
      </div>

      <label>keyphrase</label>
      <input type="password" id="passInput" placeholder="mind. 6 zeichen" maxlength="60">

      <button class="primary" id="joinBtn" type="button" disabled>jack in →</button>
    </div>
  </div>

  <div id="chat">
    <div class="topbar">
      <div class="room">raum: <b id="roomLabel"></b></div>
      <span class="status" id="statusLabel">verbinde...</span>
      <button id="leaveBtn" type="button">verlassen</button>
    </div>
    <div id="messages"></div>
    <div id="inputbar">
      <button id="photobtn" type="button" title="Foto senden">📎</button>
      <input type="file" id="fileInput" accept="image/*" style="display:none">
      <input type="text" id="msginput" placeholder="nachricht eingeben..." maxlength="500">
      <button id="sendbtn" type="button">senden</button>
    </div>
  </div>

</div>

<script>
(function(){
  let ROOM = null;
  let NAME = null;
  let TOPIC = null;
  let CRYPTO_KEY = null;
  let evtSource = null;
  let seenIds = new Set();
  let mySentPhotoIds = new Set();

  const nameInput = document.getElementById('nameInput');
  const roomInput = document.getElementById('roomInput');
  const passInput = document.getElementById('passInput');
  const joinBtn = document.getElementById('joinBtn');
  const genBtn = document.getElementById('genBtn');
  const landing = document.getElementById('landing');
  const chatEl = document.getElementById('chat');
  const roomLabel = document.getElementById('roomLabel');
  const statusLabel = document.getElementById('statusLabel');
  const messagesEl = document.getElementById('messages');
  const msginput = document.getElementById('msginput');
  const sendbtn = document.getElementById('sendbtn');
  const leaveBtn = document.getElementById('leaveBtn');
  const photobtn = document.getElementById('photobtn');
  const fileInput = document.getElementById('fileInput');

  const words = ["keks","fuchs","lampe","tanne","nebel","kiesel","dose","funk","asche","moos"];
  function genCode(){
    const w = words[Math.floor(Math.random()*words.length)];
    const n = Math.floor(Math.random()*90+10);
    const w2 = words[Math.floor(Math.random()*words.length)];
    return `${w}-${n}-${w2}`;
  }
  genBtn.addEventListener('click', ()=>{
    roomInput.value = genCode();
    checkReady();
  });

  function checkReady(){
    joinBtn.disabled = !(nameInput.value.trim() && roomInput.value.trim() && passInput.value.trim().length >= 6);
  }
  nameInput.addEventListener('input', checkReady);
  roomInput.addEventListener('input', checkReady);
  passInput.addEventListener('input', checkReady);

  function escapeHtml(s){
    return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function topicFromRoom(room){
    const clean = room.trim().toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9\-]/g,'');
    return 'blackwire-e2e-' + clean;
  }

  // ---- crypto: AES-GCM via native Web Crypto API, key from passphrase (PBKDF2) ----
  function bufToB64(buf){
    return btoa(String.fromCharCode(...new Uint8Array(buf)));
  }
  function b64ToBuf(b64){
    const bin = atob(b64);
    const arr = new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++) arr[i] = bin.charCodeAt(i);
    return arr.buffer;
  }
  async function deriveKey(passphrase, saltStr){
    const enc = new TextEncoder();
    const keyMaterial = await crypto.subtle.importKey(
      'raw', enc.encode(passphrase), 'PBKDF2', false, ['deriveKey']
    );
    return crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt: enc.encode(saltStr), iterations: 100000, hash: 'SHA-256' },
      keyMaterial,
      { name: 'AES-GCM', length: 256 },
      false,
      ['encrypt', 'decrypt']
    );
  }
  async function encryptText(plainText, key){
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const enc = new TextEncoder();
    const ciphertext = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, enc.encode(plainText));
    return bufToB64(iv) + '.' + bufToB64(ciphertext);
  }
  async function decryptText(payload, key){
    const [ivB64, ctB64] = payload.split('.');
    if(!ivB64 || !ctB64) throw new Error('malformed payload');
    const iv = new Uint8Array(b64ToBuf(ivB64));
    const ctBuf = b64ToBuf(ctB64);
    const plainBuf = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ctBuf);
    return new TextDecoder().decode(plainBuf);
  }

  // ---- binary encryption for photos: [4-byte JSON length][JSON meta][image bytes] -> AES-GCM ----
  async function encryptBinary(metaObj, fileBuf, key){
    const enc = new TextEncoder();
    const metaBytes = enc.encode(JSON.stringify(metaObj));
    const lenPrefix = new Uint8Array(4);
    new DataView(lenPrefix.buffer).setUint32(0, metaBytes.length, false);
    const combined = new Uint8Array(4 + metaBytes.length + fileBuf.byteLength);
    combined.set(lenPrefix, 0);
    combined.set(metaBytes, 4);
    combined.set(new Uint8Array(fileBuf), 4 + metaBytes.length);

    const iv = crypto.getRandomValues(new Uint8Array(12));
    const ciphertext = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, combined);
    const out = new Uint8Array(12 + ciphertext.byteLength);
    out.set(iv, 0);
    out.set(new Uint8Array(ciphertext), 12);
    return out; // Uint8Array: iv + ciphertext, ready to upload as raw bytes
  }
  async function decryptBinary(fullBuf, key){
    const bytes = new Uint8Array(fullBuf);
    const iv = bytes.slice(0, 12);
    const ct = bytes.slice(12);
    const plainBuf = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ct);
    const plain = new Uint8Array(plainBuf);
    const metaLen = new DataView(plain.buffer, plain.byteOffset, 4).getUint32(0, false);
    const metaBytes = plain.slice(4, 4 + metaLen);
    const meta = JSON.parse(new TextDecoder().decode(metaBytes));
    const fileBytes = plain.slice(4 + metaLen);
    return { meta, fileBytes };
  }

  function addMessage(from, text, ts){
    const empty = messagesEl.querySelector('.sys');
    if(empty) empty.remove();
    const div = document.createElement('div');
    div.className = 'msg' + (from === NAME ? ' me' : '');
    const time = new Date(ts).toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'});
    div.innerHTML = `<div class="ts">${time}</div><div class="body"><span class="who">${escapeHtml(from)}:</span> <span class="txt">${escapeHtml(text)}</span></div>`;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function addImageMessage(from, ts){
    const empty = messagesEl.querySelector('.sys');
    if(empty) empty.remove();
    const div = document.createElement('div');
    div.className = 'msg' + (from === NAME ? ' me' : '');
    const time = new Date(ts).toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'});
    div.innerHTML = `<div class="ts">${time}</div><div class="body"><span class="who">${escapeHtml(from)}:</span> <div class="img-wrap"><span class="img-loading">// bild wird entschlüsselt...</span></div></div>`;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div.querySelector('.img-wrap');
  }

  function showEmptyState(){
    messagesEl.innerHTML = '<div class="sys">// raum ist leer. schreib die erste nachricht.</div>';
  }

  async function handleIncoming(data){
    if(!data || data.event !== 'message') return;
    if(seenIds.has(data.id)) return;
    seenIds.add(data.id);

    if(data.attachment && data.attachment.url){
      try{
        const res = await fetch(data.attachment.url);
        const buf = await res.arrayBuffer();
        const { meta, fileBytes } = await decryptBinary(buf, CRYPTO_KEY);
        if(meta.mid && mySentPhotoIds.has(meta.mid)){
          return; // already shown locally when we sent it
        }
        const imgWrap = addImageMessage('...', (data.time || Date.now()/1000) * 1000);
        const blob = new Blob([fileBytes], { type: meta.mime || 'image/jpeg' });
        const url = URL.createObjectURL(blob);
        const msgDiv = imgWrap.closest('.msg');
        msgDiv.classList.toggle('me', meta.from === NAME);
        msgDiv.querySelector('.who').textContent = (meta.from || 'unbekannt') + ':';
        imgWrap.innerHTML = `<img src="${url}" alt="bild">`;
      } catch(e){
        console.log('could not decrypt an image (wrong passphrase or corrupt)');
      }
      return;
    }

    try{
      const decrypted = await decryptText(data.message, CRYPTO_KEY);
      const parsed = JSON.parse(decrypted);
      addMessage(parsed.from || 'unbekannt', parsed.text || '', (data.time || Date.now()/1000) * 1000);
    } catch(e){
      // wrong passphrase or garbage — silently skip, don't leak that a message exists
      console.log('could not decrypt a message (wrong passphrase?)');
    }
  }

  async function loadBacklog(){
    try{
      const res = await fetch(`https://ntfy.sh/${TOPIC}/json?poll=1&since=all`);
      const txt = await res.text();
      const lines = txt.trim().split('\n').filter(Boolean);
      if(lines.length === 0){ showEmptyState(); return; }
      for(const line of lines){
        try{ await handleIncoming(JSON.parse(line)); } catch(e){}
      }
      if(messagesEl.children.length === 0) showEmptyState();
    } catch(e){
      console.error('backlog load failed', e);
      showEmptyState();
    }
  }

  function connectLive(){
    statusLabel.textContent = 'verbinde...';
    statusLabel.className = 'status';
    try{
      evtSource = new EventSource(`https://ntfy.sh/${TOPIC}/sse`);
      evtSource.onopen = ()=>{
        statusLabel.textContent = 'live · verschlüsselt';
        statusLabel.className = 'status live';
      };
      evtSource.onmessage = (e)=>{
        try{ const data = JSON.parse(e.data); handleIncoming(data); } catch(err){}
      };
      evtSource.onerror = ()=>{
        statusLabel.textContent = 'verbindung wackelt...';
        statusLabel.className = 'status down';
      };
    } catch(e){
      statusLabel.textContent = 'offline';
      statusLabel.className = 'status down';
    }
  }

  async function joinRoom(){
    NAME = nameInput.value.trim().slice(0,20);
    ROOM = roomInput.value.trim();
    TOPIC = topicFromRoom(ROOM);
    roomLabel.textContent = ROOM;

    joinBtn.disabled = true;
    joinBtn.textContent = 'schlüssel wird erzeugt...';
    CRYPTO_KEY = await deriveKey(passInput.value, TOPIC);
    joinBtn.textContent = 'jack in →';

    landing.style.display = 'none';
    chatEl.classList.add('show');
    messagesEl.innerHTML = '<div class="sys">// lade verlauf...</div>';
    await loadBacklog();
    connectLive();
    msginput.focus();
  }
  joinBtn.addEventListener('click', joinRoom);

  leaveBtn.addEventListener('click', ()=>{
    if(evtSource) evtSource.close();
    chatEl.classList.remove('show');
    landing.style.display = 'flex';
    messagesEl.innerHTML = '';
    seenIds = new Set();
    CRYPTO_KEY = null;
    checkReady();
  });

  async function sendMessage(){
    const text = msginput.value.trim();
    if(!text) return;
    sendbtn.disabled = true;
    try{
      const payload = JSON.stringify({ from: NAME, text: text });
      const encrypted = await encryptText(payload, CRYPTO_KEY);
      await fetch(`https://ntfy.sh/${TOPIC}`, {
        method: 'POST',
        body: encrypted
      });
      msginput.value = '';
    } catch(e){
      console.error('send failed', e);
      alert('Nachricht konnte nicht gesendet werden. Verbindung prüfen.');
    } finally {
      sendbtn.disabled = false;
      msginput.focus();
    }
  }
  sendbtn.addEventListener('click', sendMessage);
  msginput.addEventListener('keydown', (e)=>{
    if(e.key === 'Enter') sendMessage();
  });

  photobtn.addEventListener('click', ()=> fileInput.click());
  fileInput.addEventListener('change', async ()=>{
    const file = fileInput.files[0];
    fileInput.value = '';
    if(!file) return;
    if(file.size > 12 * 1024 * 1024){
      alert('Bild ist größer als 12 MB, das ist zu groß. Bitte kleineres Bild wählen.');
      return;
    }
    photobtn.disabled = true;
    const localWrap = addImageMessage(NAME, Date.now());
    try{
      const fileBuf = await file.arrayBuffer();
      const mid = crypto.randomUUID ? crypto.randomUUID() : (Date.now() + '-' + Math.random());
      mySentPhotoIds.add(mid);
      const meta = { from: NAME, mime: file.type || 'image/jpeg', mid };

      // show it locally right away, don't wait for the round trip
      const localUrl = URL.createObjectURL(new Blob([fileBuf], { type: meta.mime }));
      localWrap.innerHTML = `<img src="${localUrl}" alt="bild">`;
      localWrap.closest('.msg').classList.add('me');

      const encrypted = await encryptBinary(meta, fileBuf, CRYPTO_KEY);
      const res = await fetch(`https://ntfy.sh/${TOPIC}`, {
        method: 'PUT',
        headers: { 'X-Filename': 'photo.enc' },
        body: encrypted
      });
      if(!res.ok){
        const errText = await res.text().catch(()=> '');
        throw new Error(`Server antwortete mit ${res.status}: ${errText || res.statusText}`);
      }
    } catch(e){
      console.error('photo send failed', e);
      const msgDiv = localWrap.closest('.msg');
      if(msgDiv) msgDiv.remove();
      alert('Foto konnte nicht gesendet werden: ' + (e.message || e));
    } finally {
      photobtn.disabled = false;
    }
  });

  const bootLines = [
    "booting blackwire v1.0 ...",
    "initializing local terminal ... OK",
    "loading webcrypto (AES-GCM 256) ... OK",
    "connecting to relay ... OK",
    "server sees ciphertext only. always.",
    "",
    "ready.",
    ""
  ];
  const bootEl = document.getElementById('boot');
  const landingEl = document.getElementById('landing');
  let bli = 0, bci = 0;
  function typeBoot(){
    if(bli >= bootLines.length){
      bootEl.innerHTML += '<span class="cursor">█</span>';
      setTimeout(()=>{
        bootEl.style.transition = 'opacity .4s ease';
        bootEl.style.opacity = '0';
        landingEl.style.display = 'flex';
        setTimeout(()=> bootEl.remove(), 400);
      }, 400);
      return;
    }
    const line = bootLines[bli];
    if(bci <= line.length){
      bootEl.innerHTML = bootLines.slice(0,bli).join('\n') + (bli>0?'\n':'') + line.slice(0,bci) + '<span class="cursor">█</span>';
      bci++;
      setTimeout(typeBoot, 12);
    } else {
      bli++; bci = 0;
      setTimeout(typeBoot, 55);
    }
  }
  if(window.matchMedia('(prefers-reduced-motion: reduce)').matches){
    bootEl.remove();
    landingEl.style.display = 'flex';
  } else {
    typeBoot();
  }

})();
</script>
</body>
</html>
